# Template CI — à copier dans .github/workflows/ de chaque repo nu-ances.
# Vérifie que le bloc commun du CLAUDE.md n'a pas dérivé de nu-ances/claude-rules.
#
# Prérequis : un secret `CLAUDE_RULES_TOKEN` (PAT/App fine-grained, lecture sur
# nu-ances/claude-rules) — OU rendre nu-ances/claude-rules public et retirer la
# ligne `token:` ci-dessous.
name: CLAUDE.md — bloc commun
on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # lundi 06:00 UTC — attrape les dérives introduites côté source
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Récupérer la source des règles communes
        uses: actions/checkout@v4
        with:
          repository: nu-ances/claude-rules
          path: .claude-rules-src
          token: ${{ secrets.CLAUDE_RULES_TOKEN }}
      - name: Vérifier le bloc commun
        run: python3 .claude-rules-src/sync-claude-md.py --check-one CLAUDE.md
